<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invincible</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 30px 20px 10px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .season {
      margin-top: 5px;
      color: #aaa;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .ep {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
      font-size: 14px;
    }

    .ep:hover {
      background: #2a2a35;
      transform: scale(1.03);
    }

    .ep span {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title">Invincible</div>
    <div class="season">Season 1</div>
  </div>

  <div class="grid">

    <div class="ep" onclick="openEp(1)">Episode 1 <span>Start</span></div>
    <div class="ep" onclick="openEp(2)">Episode 2</div>
    <div class="ep" onclick="openEp(3)">Episode 3</div>
    <div class="ep" onclick="openEp(4)">Episode 4</div>
    <div class="ep" onclick="openEp(5)">Episode 5</div>
    <div class="ep" onclick="openEp(6)">Episode 6</div>
    <div class="ep" onclick="openEp(7)">Episode 7</div>
    <div class="ep" onclick="openEp(8)">Episode 8</div>

  </div>

  <script>
    const base = "https://vidcore.net/tv/tt6741278/1/";

    function openEp(ep) {
      window.open(base + ep, "_blank");
    }
  </script>

</body>
</html>

</body>
</html>
