<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invincible</title>

  <style>
    /* ====== CHANGE THESE ====== */
    :root {
      --bg-image: url("rewds.avif");
      --title-image: url("das.jpg");
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      /* Background image */
      background: var(--bg-image) center/cover no-repeat fixed;
    }

    /* Dark overlay for readability */
    .overlay {
      background: rgba(0, 0, 0, 0.75);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .header {
      padding: 30px 20px 10px;
      text-align: center;
    }

    /* Title image instead of text */
    .title-img {
      width: 280px;
      max-width: 80%;
      height: auto;
      margin: 0 auto;
      display: block;
    }

    .season {
      margin-top: 10px;
      color: #aaa;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .ep {
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid #2a2a35;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    .ep:hover {
      transform: scale(1.05);
      background: rgba(40, 40, 50, 0.9);
    }
  </style>
</head>

<body>

  <div class="overlay">

    <div class="header">
      <!-- Title image -->
      <img class="title-img" src="invincible title.png" alt="Invincible">
      <div class="season">Season 1</div>
    </div>

    <div class="grid">

      <div class="ep" onclick="openEp(1)">Episode 1</div>
      <div class="ep" onclick="openEp(2)">Episode 2</div>
      <div class="ep" onclick="openEp(3)">Episode 3</div>
      <div class="ep" onclick="openEp(4)">Episode 4</div>
      <div class="ep" onclick="openEp(5)">Episode 5</div>
      <div class="ep" onclick="openEp(6)">Episode 6</div>
      <div class="ep" onclick="openEp(7)">Episode 7</div>
      <div class="ep" onclick="openEp(8)">Episode 8</div>

    </div>

  </div>

  <script>
    const base = "https://vidcore.net/tv/tt6741278/1/";

    function openEp(ep) {
      window.open(base + ep, "_blank");
    }
  </script>



  <div class="overlay">

    <div class="header">
      <!-- Title image -->
      <div class="season">Season 2</div>
    </div>

    <div class="grid">

      <div class="ep" onclick="openEp(1)">Episode 1</div>
      <div class="ep" onclick="openEp(2)">Episode 2</div>
      <div class="ep" onclick="openEp(3)">Episode 3</div>
      <div class="ep" onclick="openEp(4)">Episode 4</div>
      <div class="ep" onclick="openEp(5)">Episode 5</div>
      <div class="ep" onclick="openEp(6)">Episode 6</div>
      <div class="ep" onclick="openEp(7)">Episode 7</div>
      <div class="ep" onclick="openEp(8)">Episode 8</div>

    </div>

  </div>

  <script>
    const base = "https://vidcore.net/tv/tt6741278/2/";

    function openEp(ep) {
      window.open(base + ep, "_blank");
    }
  </script>

  </body>
</html>
